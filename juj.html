<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Classic FC Cards - SXJ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    margin:0;
    font-family:Segoe UI,sans-serif;
    background:#0b0b0b;
    color:white;
}

/* TOPBAR */

.topbar{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);

    width:92%;
    max-width:1200px;

    display:flex;
    flex-direction:column;

    padding:12px 16px;
    gap:10px;

    background:#111;

    border-radius:18px;
    border:1px solid rgba(255,255,255,0.05);

    box-shadow:0 10px 25px rgba(0,0,0,0.6);

    z-index:999;
}

.left{
    display:flex;
    align-items:center;
    gap:10px;
}

.logo{
    height:32px;
    width:auto;
    border-radius:10px;
}

.nav{
    display:flex;
    flex-wrap:nowrap;
    overflow-x:auto;
    gap:6px;

    max-width:100%;

    -webkit-overflow-scrolling:touch;
}

.nav button{
    flex:0 0 auto;

    padding:6px 10px;

    border:none;
    border-radius:999px;

    background:transparent;
    color:#aaa;

    cursor:pointer;

    white-space:nowrap;
}

.nav button.active{
    background:white;
    color:black;
}

/* MAIN */

.main{
    margin-top:170px;
    padding:20px;
}

/* CLUB SELECTOR */

.club-selector{
    display:flex;
    gap:10px;

    overflow-x:auto;

    padding-bottom:10px;

    margin-bottom:30px;

    -webkit-overflow-scrolling:touch;
}

.club-selector button{
    flex:0 0 auto;

    padding:10px 14px;

    border:none;
    border-radius:12px;

    background:#1a1a1a;
    color:white;

    cursor:pointer;

    transition:0.2s;
}

.club-selector button:hover{
    background:#222;
    transform:translateY(-2px);
}

/* CLUB TITLE */

.club-title{
    margin-top:40px;
    margin-bottom:20px;
}

.club-title h2{
    margin:0;
}

.club-title p{
    margin-top:5px;
    opacity:0.6;
}

/* GRID */

.grid{
    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(220px,1fr));

    gap:18px;
}

/* MICRO PROFILE */

.player-card{
    background:#1a1a1a;

    border-radius:18px;

    overflow:hidden;

    border:1px solid rgba(255,255,255,0.05);

    transition:0.2s ease;

    cursor:pointer;
}

.player-card:hover{
    transform:translateY(-4px);
    background:#222;

    box-shadow:0 15px 30px rgba(0,0,0,0.6);
}

.player-img{
    width:100%;
    height:260px;

    object-fit:cover;

    display:block;
}

.player-info{
    padding:15px;
}

.player-info h3{
    margin:0;
    font-size:20px;
}

.player-info p{
    margin-top:6px;
    opacity:0.7;
}

.price{
    margin-top:12px;

    font-weight:600;
}

.order-btn{
    margin-top:15px;

    width:100%;

    padding:10px;

    border:none;
    border-radius:12px;

    background:white;
    color:black;

    cursor:pointer;

    font-weight:600;
}

/* DESKTOP */

@media(min-width:768px){

    .topbar{
        flex-direction:row;

        align-items:center;
        justify-content:space-between;

        padding:15px 30px;
    }

    .logo{
        height:40px;
    }

    .nav button{
        font-size:14px;
        padding:8px 14px;
    }

    .main{
        padding:30px;
    }
}

html{
    scroll-behavior:smooth;
}

body{
    opacity:0;
    transition:opacity 0.25s ease;
}

body.loaded{
    opacity:1;
}

</style>
</head>

<body>

<!-- TOPBAR -->

<div class="topbar">

    <div class="left">
        <img class="logo"
        src="../../../assets/SXJ%20Embedded%20System%20Labs%20-%20Secure%20X-Core%20J-Frame.jpg">

        <div>
            <b>SXJ Embedded System Labs</b>
        </div>
    </div>

    <div class="nav">
        <button onclick="go('../../../index.html')">Home</button>

        <button class="active"
        onclick="go('../../../products.html')">
        Products
        </button>

        <button onclick="go('../../../contacts.html')">
        Contact
        </button>
    </div>

</div>

<!-- MAIN -->

<div class="main">

    <h1>Classic FC Cards</h1>
    <p style="opacity:0.6;">
        SXJ Classic Football Cards
    </p>

    <!-- CLUB SELECTOR -->

    <div class="club-selector">

        <button onclick="scrollToClub('realmadrid')">
            Real Madrid
        </button>

        <button onclick="scrollToClub('barcelona')">
            Barcelona
        </button>

        <button onclick="scrollToClub('psg')">
            PSG
        </button>

    </div>

    <!-- REAL MADRID -->

    <section id="realmadrid">

        <div class="club-title">
            <h2>Real Madrid</h2>
            <p>Classic Real Madrid Cards</p>
        </div>

        <div class="grid">

            <!-- PLAYER -->

            <div class="player-card"
            onclick="go('products/ronaldo-94-real-madrid.html')">

                <img class="player-img"
                src="assets/ronaldo.png">

                <div class="player-info">

                    <h3>Cristiano Ronaldo</h3>

                    <p>Real Madrid • 94 Rated</p>

                    <div class="price">
                        141 BDT
                    </div>

                    <button class="order-btn">
                        View Card
                    </button>

                </div>

            </div>

            <!-- PLAYER -->

            <div class="player-card">

                <img class="player-img"
                src="assets/bellingham.png">

                <div class="player-info">

                    <h3>Jude Bellingham</h3>

                    <p>Real Madrid • 90 Rated</p>

                    <div class="price">
                        135 BDT
                    </div>

                    <button class="order-btn">
                        View Card
                    </button>

                </div>

            </div>

        </div>

    </section>

    <!-- PSG -->

    <section id="psg">

        <div class="club-title">
            <h2>PSG</h2>
            <p>Classic PSG Cards</p>
        </div>

        <div class="grid">

            <div class="player-card">

                <img class="player-img"
                src="assets/mbappe.png">

                <div class="player-info">

                    <h3>Kylian Mbappé</h3>

                    <p>PSG • 91 Rated</p>

                    <div class="price">
                        136.5 BDT
                    </div>

                    <button class="order-btn">
                        View Card
                    </button>

                </div>

            </div>

        </div>

    </section>

</div>

<script>

window.onload = () => {
    document.body.classList.add("loaded");
};

function go(url){

    document.body.classList.remove("loaded");

    setTimeout(()=>{
        window.location.href = url;
    },200);
}

function scrollToClub(id){

    document.getElementById(id)
    .scrollIntoView({
        behavior:"smooth"
    });
}

</script>

</body>
  </html>
