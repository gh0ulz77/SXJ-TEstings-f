<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Products - Vex - SXJ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Segoe UI, sans-serif;
    background:#0b0b0b;
    color:white;
}

/* TOP BAR */
.topbar{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    width:92%;
    max-width:1200px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:14px 20px;

    background:#1a1a1a;
    border-radius:18px;
    border:1px solid rgba(255,255,255,0.05);

    box-shadow:0 10px 25px rgba(0,0,0,0.6);
}

.topbar{
    position: fixed;
    z-index: 999;
}

.left{
    display:flex;
    align-items:center;
    gap:12px;
}

.logo{
    width: 100px;
    height: 50px;
    border-radius:10px;
}

/* NAV */
.nav{
    display:flex;
    gap:10px;
}

.nav button{
    padding:9px 14px;
    border:none;
    border-radius:999px;

    background:transparent;
    color:#aaa;
    cursor:pointer;
}

.nav button.active{
    background:white;
    color:black;
}

/* MAIN */
.main{
    margin-top:140px;
    padding:30px;
}

/* CONTACT CARD */
.card{
    display:flex;
    align-items:center;
    justify-content:space-between;

    background:#1a1a1a;
    border-radius:18px;
    padding:20px;
    margin:15px auto;
    max-width:800px;

    border:1px solid rgba(255,255,255,0.05);
    box-shadow:0 10px 20px rgba(0,0,0,0.5);
}

.info{
    flex:1;
    margin-left:20px;
}

.info h3{
    margin:0;
    letter-spacing:3px;
}

.info p{
    margin:5px 0 0 0;
    opacity:0.6;
}

.card{
    transition: 0.2s ease;
}

.card:hover{
    transform: translateY(-3px);
    background:#222;
    box-shadow:0 15px 30px rgba(0,0,0,0.6);
}

body{
    opacity:0;
    transition: opacity 0.25s ease;
}

/* when page is ready */
body.loaded{
    opacity:1;
}

.product-card{
    margin:15px auto;
    max-width:800px;
    padding:20px;

    background:#1a1a1a;
    border-radius:15px;
    border:1px solid rgba(255,255,255,0.05);

    transition:0.2s;
}

.product-card:hover{
    transform:translateY(-3px);
    background:#222;
}

.back-btn{
    padding:10px 16px;

    background:#1a1a1a;
    color:white;

    border:1px solid rgba(255,255,255,0.05);
    border-radius:12px;

    cursor:pointer;

    box-shadow:0 8px 20px rgba(0,0,0,0.4);

    transition:0.2s ease;

    display:inline-flex;
    align-items:center;
    gap:8px;
}

.back-btn:hover{
    transform:translateY(-2px);
    background:#222;
    box-shadow:0 12px 25px rgba(0,0,0,0.6);
}

.back-btn:active{
    transform:translateY(0px);
}

.topbar{
    display:flex;
    flex-direction:column; /* forces 2 rows */

    padding:12px 16px;
    gap:10px;

    background:#111;
    color:white;
}

/* top row */
.left{
    display:flex;
    align-items:center;
    gap:10px;
}

/* logo fix */
.logo{
    height:32px;
    width:auto; /* prevents deformation */
}

/* nav row */
.nav{
    display:flex;
    flex-wrap:wrap; /* KEY: moves buttons to next line */
    gap:6px;
}

.nav button{
    font-size:12px;
    padding:6px 10px;
}

@media (min-width:768px){

    .topbar{
        padding:15px 30px;
    }

    .logo{
        height:40px;
    }

    .nav{
        gap:10px;
    }

    .nav button{
        font-size:14px;
        padding:8px 14px;
    }
}

@media (min-width:768px){

    .topbar{
        flex-direction:row;              /* back to single row */
        align-items:center;
        justify-content:space-between;
    }

    .nav{
        flex-wrap:nowrap;                /* keep buttons in one line */
    }
}

.nav{
    display:flex;
    flex-wrap:nowrap;        /* stop wrapping */
    overflow-x:auto;         /* allow scroll */
    gap:6px;

    -webkit-overflow-scrolling:touch; /* smooth scroll on phone */
}

.nav button{
    flex:0 0 auto;           /* prevents shrinking */
}

.topbar{
    overflow:hidden;
}

.nav{
    display:flex;
    flex-wrap:nowrap;
    gap:6px;

    overflow-x:auto;        /* allows scroll INSIDE nav */
    max-width:100%;
}

.nav button{
    flex:0 0 auto;
    white-space:nowrap;
}

.topbar{
    box-sizing:border-box;
    max-width:100%;
}
</style>
</head>

<body>

<div id="toast">
</div>

<div class="topbar">

    <div class="left">
        <img class="logo" src="../assets/SXJ%20Embedded%20System%20Labs%20-%20Secure%20X-Core%20J-Frame.jpg">
        <div><b>SXJ Embedded System Labs</b></div>
    </div>

    <div class="nav">
        <button onclick="go('index.html')">Home</button>
        <button class="active" onclick="go('products.html')">Products</button>
        <button onclick="go('branches.html')">Brands</button>
        <button onclick="go('contacts.html')">Contact</button>
        <button onclick="go('license.html')">License</button>
        <button onclick="go('readme.html')">README</button>
    </div>

</div>

<div class="main">

    <button class="back-btn" onclick="go('../products.html')">Back</button>

    <h1>VEX SERIES</h1>
    <p style="opacity:0.6;">Compact & efficient embedded devices</p>

    <!-- PRODUCT LIST -->

    <div class="product-card" onclick="go('../vex-pages/vex-a1.html')">
        <h3>VEX A1</h3>
        <p>Ultra low-power micro controller board</p>
    </div>

    <div class="product-card" onclick="go('../vex-pages/vex-a2.html')">
        <h3>VEX A2</h3>
        <p>Balanced performance IoT system</p>
    </div>

</div>

<script>
window.onload = () => {
    document.body.classList.add("loaded");
};

function go(url){
    document.body.classList.remove("loaded");

    setTimeout(()=>{
        window.location.href = url;
    }, 200);
}
</script>
</body>
</html>
</body>
</html>
