<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Classic FC Cards - SXJ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    margin:0;
    font-family:Segoe UI,sans-serif;
    background:#0b0b0b;
    color:white;
}

/* TOPBAR */

.topbar{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    width:92%;
    max-width:1200px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:14px 20px;

    background:#1a1a1a;
    border-radius:18px;
    border:1px solid rgba(255,255,255,0.05);

    box-shadow:0 10px 25px rgba(0,0,0,0.6);
}

.topbar{
    position: fixed;
    z-index: 999;
}

.left{
    display:flex;
    align-items:center;
    gap:12px;
}

.logo{
    width: 100px;
    height: 50px;
    border-radius:10px;
}

/* NAV */
.nav{
    display:flex;
    gap:10px;
}

.nav button{
    padding:9px 14px;
    border:none;
    border-radius:999px;

    background:transparent;
    color:#aaa;
    cursor:pointer;
}

.nav button.active{
    background:white;
    color:black;
}

/* MAIN */

.main{
    margin-top:170px;
    padding:20px;
}

/* CLUB SELECTOR */

.club-selector{
    display:flex;
    gap:10px;

    overflow-x:auto;

    padding-bottom:10px;

    margin-bottom:30px;

    -webkit-overflow-scrolling:touch;
}

.club-selector button{
    flex:0 0 auto;

    padding:10px 14px;

    border:none;
    border-radius:12px;

    background:#1a1a1a;
    color:white;

    cursor:pointer;

    transition:0.2s;
}

.club-selector button:hover{
    background:#222;
    transform:translateY(-2px);
}

/* CLUB TITLE */

.club-title{
    margin-top:40px;
    margin-bottom:20px;
}

.club-title h2{
    margin:0;
}

.club-title p{
    margin-top:5px;
    opacity:0.6;
}

/* GRID */

.grid{
    display:flex;
    flex-wrap:wrap;

    gap:18px;
}
/* MICRO PROFILE */

.player-card{
    background:#1a1a1a;

    width: 200px;

    border-radius:18px;

    overflow:hidden;

    border:1px solid rgba(255,255,255,0.05);

    transition:0.2s ease;

    cursor:pointer;
}

.player-card:hover{
    transform:translateY(-4px);
    background:#222;

    box-shadow:0 15px 30px rgba(0,0,0,0.6);
}

.player-img{
    width: 200px;
    height: 290px;

    object-fit:cover;

    display: block;
}


.player-info{
    padding:15px;
}

.player-info h3{
    margin:0;
    font-size:20px;
}

.player-info p{
    margin-top:6px;
    opacity:0.7;
}

.price{
    margin-top:12px;

    font-weight:600;
}

.order-btn{
    margin-top:15px;

    width:100%;

    padding:10px;

    border:none;
    border-radius:12px;

    background:white;
    color:black;

    cursor:pointer;

    font-weight:600;
}

/* DESKTOP */

@media(min-width:768px){

    .topbar{
        flex-direction:row;

        align-items:center;
        justify-content:space-between;

        padding:15px 30px;
    }

    .logo{
        height:40px;
    }

    .nav button{
        font-size:14px;
        padding:8px 14px;
    }

    .main{
        padding:30px;
    }
}

html{
    scroll-behavior:smooth;
}

body{
    opacity:0;
    transition:opacity 0.25s ease;
}

body.loaded{
    opacity:1;
}

</style>
</head>

<body>

<!-- TOPBAR -->

<div class="topbar">

    <div class="left">
        <img class="logo"
        src="../../assets/logo.jpg">

        <div>
            <b>SXJ Embedded System Labs</b>
        </div>
    </div>

    <div class="nav">
        <button onclick="go('../../../index.html')">Home</button>

        <button class="active"
        onclick="go('../../../products.html')">
        Products
        </button>

        <button onclick="go('../../../contacts.html')">
        Contact
        </button>
    </div>

</div>

<!-- MAIN -->

<div class="main">

    <h1>Classic FC Cards</h1>
    <p style="opacity:0.6;">
        SXJ Classic Football Cards
    </p>

    <!-- CLUB SELECTOR -->

    <div class="club-selector">

        <button onclick="scrollToClub('realmadrid')">
            Real Madrid
        </button>

        <button onclick="scrollToClub('barcelona')">
            Barcelona
        </button>

        <button onclick="scrollToClub('psg')">
            PSG
        </button>

    </div>

    <!-- REAL MADRID -->

    <section id="realmadrid">

        <div class="club-title">
            <h2>Real Madrid</h2>
            <p>Classic Real Madrid Cards</p>
        </div>

        <div class="grid" id="realmadrid-grid"></div>

    </section>

    <!-- PSG -->

    <section id="psg">

        <div class="club-title">
            <h2>PSG</h2>
            <p>Classic PSG Cards</p>
        </div>

        <div class="grid" id="psg-grid"></div>

    </section>

</div>

<script>

window.onload = () => {
    document.body.classList.add("loaded");
};

function go(url){

    document.body.classList.remove("loaded");

    setTimeout(()=>{
        window.location.href = url;
    },200);
}

function scrollToClub(id){

    document.getElementById(id)
    .scrollIntoView({
        behavior:"smooth"
    });
}

</script>

<script>

    const cards = [
    
    {
        file:"ronaldo-94-real-madrid",
        image:"assets/WhatsApp Image 2026-05-11 at 6.35.04 PM.jpeg",
        club:"Real Madrid",
        rating:94,
        section:"realmadrid"
    },

    {
        file:"mbappe-91-psg",
        image:"assets/mbappe.png",
        club:"PSG",
        rating:91,
        section:"psg"
    }
    
    ];
    
    function buildCards(){
    
        cards.forEach(card => {
    
            const grid =
            document.getElementById(
                card.section + "-grid"
            );
    
            if(!grid) return;
    
            const playerName =
            card.file
            .split("-")
            .slice(0,-3)
            .join(" ");
    
            const price =
            card.rating * 1.5;
    
            grid.innerHTML += `
    
            <div class="player-card"
            onclick="go('products/${card.file}.html')">
    
                <img class="player-img"
                src="${card.image}">
    
                <div class="player-info">
    
                    <h3>${playerName}</h3>
    
                    <p>
                        ${card.club}
                        •
                        ${card.rating} Rated
                    </p>
    
                    <div class="price">
                        ${price} BDT
                    </div>
    
                    <button class="order-btn">
                        View Card
                    </button>
    
                </div>
    
            </div>
    
            `;
        });
    }
    
    buildCards();
    
    </script>

</body>
</html>
